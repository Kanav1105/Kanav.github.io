<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canteen – IITR Bhawan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =====================
       RESET & BASE
    ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #ff6b35;
      --brand-deep: #e85520;
      --brand-soft: #fff2ed;
      --bg:         #f5f4f0;
      --surface:    #ffffff;
      --text:       #1a1a1a;
      --muted:      #888;
      --border:     #e8e6e0;
      --shadow-sm:  0 2px 8px rgba(0,0,0,.07);
      --shadow-md:  0 6px 24px rgba(0,0,0,.10);
      --r:          14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* =====================
       APP WRAPPER (mobile-first)
    ===================== */
    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      padding-bottom: 120px; /* space for floating bar */
    }

    /* =====================
       HERO
    ===================== */
    .hero {
      background: var(--surface);
      padding: 32px 20px 28px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,107,53,.14), transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--brand-soft);
      color: var(--brand);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      margin-bottom: 14px;
    }

    .hero-badge span { font-size: 14px; }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--brand);
    }

    .hero p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 300px;
    }

    .hero-meta {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .hero-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }

    .hero-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.3); }
    }

    /* =====================
       CATEGORY TABS
    ===================== */
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--bg);
      padding: 12px 0 0;
      border-bottom: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 20px 12px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 99px;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }

    .tab-btn:hover { border-color: var(--brand); color: var(--brand); }

    .tab-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    /* =====================
       MENU SECTION
    ===================== */
    .menu-section {
      padding: 24px 20px 8px;
      scroll-margin-top: 72px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .icon { font-size: 20px; }

    /* =====================
       ITEM CARD
    ===================== */
    .item-card {
      background: var(--surface);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: box-shadow .2s ease;
    }

    .item-card:hover { box-shadow: var(--shadow-md); }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .popular-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      background: #fff3e0;
      color: #e65100;
      padding: 2px 7px;
      border-radius: 99px;
    }

    .item-price {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--brand);
      margin-top: 3px;
    }

    .item-price::before { content: '₹'; font-size: 12px; }

    /* =====================
       ADD / COUNTER BUTTON
    ===================== */
    .add-btn {
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      border: none;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, background .2s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .add-btn:hover  { background: var(--brand-deep); transform: scale(1.05); }
    .add-btn:active { transform: scale(.95); }

    .counter {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--brand-soft);
      border-radius: 10px;
      overflow: hidden;
    }

    .counter-btn {
      width: 32px; height: 34px;
      background: none;
      border: none;
      font-size: 18px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      transition: background .15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-btn:hover { background: rgba(255,107,53,.12); }

    .counter-qty {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
      min-width: 22px;
      text-align: center;
    }

    /* =====================
       ORDER FORM
    ===================== */
    .order-form-wrap {
      margin: 8px 20px 20px;
      background: var(--surface);
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }

    .form-row { margin-bottom: 12px; }

    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 5px;
    }

    .form-row input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s ease;
    }

    .form-row input:focus { border-color: var(--brand); }
    .form-row input::placeholder { color: #bbb; }

    /* =====================
       FLOATING CART BAR
    ===================== */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 100;
      padding: 12px 20px 20px;
      background: linear-gradient(to top, var(--bg) 80%, transparent);
      pointer-events: none;
    }

    .cart-bar-inner {
      background: var(--text);
      border-radius: var(--r);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.22);
      pointer-events: auto;
      transform: translateY(100px);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }

    .cart-bar-inner.visible { transform: translateY(0); }

    .cart-bar-left { display: flex; flex-direction: column; gap: 1px; }

    .cart-count {
      font-size: 11px;
      color: rgba(255,255,255,.5);
      font-weight: 500;
    }

    .cart-total {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .cart-total span { font-size: 13px; }

    .cart-checkout-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: background .2s ease, transform .15s ease;
    }

    .cart-checkout-btn:hover  { background: var(--brand-deep); }
    .cart-checkout-btn:active { transform: scale(.97); }

    .wa-icon { font-size: 17px; }

    /* =====================
       EMPTY CART MESSAGE (in form area)
    ===================== */
    .empty-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 16px 0 4px;
      display: none;
    }

    /* =====================
       TOAST
    ===================== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--text);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 99px;
      z-index: 200;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* =====================
       FOOTER
    ===================== */
    .footer {
      text-align: center;
      padding: 24px 20px 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* =====================
       RESPONSIVE (> 480px)
    ===================== */
    @media (min-width: 481px) {
      body { background: #dedad4; }
      #app {
        margin: 24px auto;
        min-height: auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.15);
      }
      .cart-bar { border-radius: 0 0 20px 20px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge"><span>🍽️</span> Bhawan Canteen</div>
    <h1>Skip the queue.<br>Order <em>instantly.</em></h1>
    <p>Fresh food, fast delivery to your room. Place your order in seconds via WhatsApp.</p>
    <div class="hero-meta">
      <div class="hero-chip"><span class="dot"></span> Open Now</div>
      <div class="hero-chip">🕐 8 AM – 11 PM</div>
      <div class="hero-chip">📍 Main Bhawan</div>
    </div>
  </section>

  <!-- CATEGORY TABS -->
  <div class="tabs-wrap">
    <div class="tabs" id="categoryTabs"></div>
  </div>

  <!-- MENU (rendered by JS) -->
  <div id="menuContainer"></div>

  <!-- ORDER FORM -->
  <div class="order-form-wrap">
    <div class="form-title">Your Details</div>
    <div class="form-row">
      <label>Your Name</label>
      <input type="text" id="userName" placeholder="e.g. Rohan Gupta" maxlength="60" />
    </div>
    <div class="form-row">
      <label>Room Number</label>
      <input type="text" id="roomNumber" placeholder="e.g. A-204" maxlength="20" />
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Made with ❤️ for hostel life<br>
    <span>© 2025 Bhawan Canteen</span>
  </div>

</div>

<!-- FLOATING CART BAR -->
<div class="cart-bar">
  <div class="cart-bar-inner" id="cartBar">
    <div class="cart-bar-left">
      <span class="cart-count" id="cartCount">0 items</span>
      <span class="cart-total">₹<span id="cartTotal">0</span></span>
    </div>
    <button class="cart-checkout-btn" id="checkoutBtn" onclick="checkout()">
      <span class="wa-icon">💬</span> Order via WhatsApp
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  /* =====================
     CONFIG: Replace with your WhatsApp number (with country code, no +)
  ===================== */
  const WHATSAPP_NUMBER = "919971356475"; // <-- REPLACE THIS

  /* =====================
     MENU DATA
  ===================== */
  const MENU = [
    {
      id: "snacks",
      label: "Snacks",
      icon: "🍟",
      items: [
        { name: "Noodles",        price: 30 },
        { name: "Masala Patties", price: 20 },
        { name: "Cheese Patties", price: 30, popular: true },
        { name: "French Fries",   price: 30, popular: true },
        { name: "Peri Peri Fries",price: 50, popular: true },
        { name: "Poha",           price: 30 },
        { name: "Patties Bhujia", price: 30 },
        { name: "Macaroni",       price: 30 },
        { name: "Peanut Chaat",   price: 40 },
        { name: "Bhel",           price: 30 },
        { name: "Vada Pav",       price: 30, popular: true },
      ]
    },
    {
      id: "maggi-rice",
      label: "Maggi & Rice",
      icon: "🍜",
      items: [
        { name: "Maggie Soup",         price: 30 },
        { name: "Fried Maggie",        price: 30 },
        { name: "Egg Soup Maggie",     price: 40 },
        { name: "Egg Fried Maggie",    price: 40, popular: true },
        { name: "Cheese Maggie",       price: 40, popular: true },
        { name: "Cheese Fried Maggie", price: 40 },
        { name: "Fried Rice",          price: 30 },
        { name: "Egg Fried Rice",      price: 40, popular: true },
        { name: "Paneer Rice",         price: 50, popular: true },
      ]
    },
    {
      id: "parathas",
      label: "Parathas",
      icon: "🫓",
      items: [
        { name: "Mix Paratha",    price: 25, popular: true },
        { name: "Paneer Paratha", price: 25, popular: true },
      ]
    },
    {
      id: "burgers",
      label: "Burgers & Sandwiches",
      icon: "🍔",
      items: [
        { name: "Veg Burger",            price: 30 },
        { name: "Cheese Burger",         price: 40, popular: true },
        { name: "Egg Burger",            price: 40 },
        { name: "Egg Cheese Burger",     price: 50, popular: true },
        { name: "Veg Tandoori Burger",   price: 50 },
        { name: "Tandoori Cheese Burger",price: 60, popular: true },
        { name: "Veg Sandwich",          price: 40 },
        { name: "Cheese Sandwich",       price: 45 },
        { name: "Tandoori Sandwich",     price: 50 },
        { name: "Cheese Corn Sandwich",  price: 50, popular: true },
        { name: "Egg Sandwich",          price: 40 },
        { name: "Tandoori Patties",      price: 35 },
      ]
    }
  ];

  /* =====================
     CART STATE
  ===================== */
  const cart = {}; // key: "categoryId::itemName", value: { name, price, qty }

  /* =====================
     RENDER MENU
  ===================== */
  function renderMenu() {
    const container = document.getElementById("menuContainer");
    const tabsEl    = document.getElementById("categoryTabs");

    MENU.forEach((cat, idx) => {
      // Tab
      const tab = document.createElement("button");
      tab.className = "tab-btn" + (idx === 0 ? " active" : "");
      tab.textContent = cat.label;
      tab.dataset.cat = cat.id;
      tab.onclick = () => {
        document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("sec-" + cat.id).scrollIntoView({ behavior: "smooth" });
      };
      tabsEl.appendChild(tab);

      // Section
      const section = document.createElement("section");
      section.className = "menu-section";
      section.id = "sec-" + cat.id;

      const heading = document.createElement("div");
      heading.className = "section-title";
      heading.innerHTML = `<span class="icon">${cat.icon}</span>${cat.label}`;
      section.appendChild(heading);

      cat.items.forEach(item => {
        const key = cat.id + "::" + item.name;
        const card = document.createElement("div");
        card.className = "item-card";
        card.id = "card-" + key.replace(/\s+/g, "-").replace(/::/g, "-");

        card.innerHTML = `
          <div class="item-info">
            <div class="item-name">
              ${item.name}
              ${item.popular ? '<span class="popular-tag">Popular</span>' : ''}
            </div>
            <div class="item-price">${item.price}</div>
          </div>
          <div id="ctrl-${key.replace(/\s+/g, "_")}">${renderCtrl(key, 0)}</div>
        `;
        section.appendChild(card);
      });

      container.appendChild(section);
    });
  }

  /* =====================
     RENDER CONTROL (add btn or counter)
  ===================== */
  function renderCtrl(key, qty) {
    const safeKey = key.replace(/\s+/g, "_");
    if (qty === 0) {
      return `<button class="add-btn" onclick="addItem('${key}')">+</button>`;
    }
    return `
      <div class="counter">
        <button class="counter-btn" onclick="changeQty('${key}',-1)">−</button>
        <span class="counter-qty">${qty}</span>
        <button class="counter-btn" onclick="changeQty('${key}',+1)">+</button>
      </div>`;
  }

  function getCtrlEl(key) {
    return document.getElementById("ctrl-" + key.replace(/\s+/g, "_"));
  }

  /* =====================
     CART OPERATIONS
  ===================== */
  function addItem(key) {
    // Find item metadata
    let found = null;
    MENU.forEach(cat => {
      cat.items.forEach(item => {
        if ((cat.id + "::" + item.name) === key) found = item;
      });
    });
    if (!found) return;

    cart[key] = { name: found.name, price: found.price, qty: 1 };
    getCtrlEl(key).innerHTML = renderCtrl(key, 1);
    updateCartBar();
    showToast("Added " + found.name);
  }

  function changeQty(key, delta) {
    if (!cart[key]) return;
    cart[key].qty += delta;
    if (cart[key].qty <= 0) {
      delete cart[key];
      getCtrlEl(key).innerHTML = renderCtrl(key, 0);
    } else {
      getCtrlEl(key).innerHTML = renderCtrl(key, cart[key].qty);
    }
    updateCartBar();
  }

  /* =====================
     CART BAR UI
  ===================== */
  function updateCartBar() {
    const keys   = Object.keys(cart);
    const total  = keys.reduce((s, k) => s + cart[k].price * cart[k].qty, 0);
    const count  = keys.reduce((s, k) => s + cart[k].qty, 0);

    document.getElementById("cartTotal").textContent = total;
    document.getElementById("cartCount").textContent = count + " item" + (count !== 1 ? "s" : "");

    const bar = document.getElementById("cartBar");
    if (count > 0) bar.classList.add("visible");
    else           bar.classList.remove("visible");
  }

  /* =====================
     CHECKOUT
  ===================== */
  function checkout() {
    const name = document.getElementById("userName").value.trim();
    const room = document.getElementById("roomNumber").value.trim();
    const keys = Object.keys(cart);

    if (keys.length === 0) { showToast("Your cart is empty!"); return; }
    if (!name)             { showToast("Please enter your name"); scrollToForm(); return; }
    if (!room)             { showToast("Please enter your room number"); scrollToForm(); return; }

    let lines = "Hello! I'd like to place an order:\n\n";
    let total = 0;

    keys.forEach(k => {
      const { name: n, price, qty } = cart[k];
      const sub = price * qty;
      total += sub;
      lines += `• ${n} x${qty} = ₹${sub}\n`;
    });

    lines += `\n*Total = ₹${total}*\n\nName: ${name}\nRoom No: ${room}`;

    const url = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(lines);
    window.open(url, "_blank");
  }

  function scrollToForm() {
    document.querySelector(".order-form-wrap").scrollIntoView({ behavior: "smooth" });
  }

  /* =====================
     TOAST
  ===================== */
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
  }

  /* =====================
     INIT
  ===================== */
  renderMenu();
</script>
</body>
</html>
